<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <img src="https://i.ibb.co/27t0DbGh/LOGO-2-ALT.png" class="bgpic">

    <div class="mid">
        <div class="tab">
            <div class="top">
                <img src="https://i.ibb.co/yc4XQ9dV/MAIN-LOGO.png" alt="MAIN-LOGO">
                <h2>Sign In</h2>
            </div>

            <div class="input">
                <p>Username</p>
                <input type="text" class="box">
            </div>

            <div class="input">
                <p>Password</p>
                <input type="password" class="box">
            </div>
            
            <button>Log In</button>

            <div class="create">
                <p>Dont have an account yet?</p>
                <a href="">Create Account</a>
            </div>
        </div>
    </div>
    
    <div class="footer">

            <p>Connect w/ Developers:</p>

                <path d="M22.5 6.908V6.75a3 3 0 0 0-3-3h-15a3 3 0 0 0-3 3v.158l9.714 5.978a1.5 1.5 0 0 0 1.572 0L22.5 6.908Z" />
