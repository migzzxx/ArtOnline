<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="signup.css">
</head>

<body>
    <img src="assets/LOGO 2 ALT.png" class="bgpic">

    <div class="mid">
        <div class="tab">
            <h2>Create Account</h2>

            <div class="input">
                <p>Email  Address</p>
                <input type="text" class="box">
            </div>

            <div class="input">
                <p>Username</p>
                <input type="text" class="box">
            </div>

            <div class="input">
                <p>Create Password</p>
                <div class="passwrap">
                    <input type="password" class="box">
                    <button type="button" class="see">
                        <span class="material-symbols-rounded">visibility_off</span>
                    </button>
                </div>
            </div>

            <div class="input">
                <p>Re-enter Password</p>
                <div class="passwrap">
                    <input type="password" class="box">
                    <button type="button" class="see">
                        <span class="material-symbols-rounded">visibility_off</span>
                    </button>
                </div>
            </div>

            <div class="tos">
                <p>By signing up, you agree to our</p>
                <a href="login.html">Terms & Privacy Policy</a>
            </div>
            <button class="signbtn">Sign Up</button>
            <a href="login.html">Already have an account</a>
        </div>
    </div>
    
    <div class="footer">
        <p>© Art Online, 2026. All rights reserved.</p>
        <div class="cont">
            <p>Connect w/ Developers:</p>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M1.5 8.67v8.58a3 3 0 0 0 3 3h15a3 3 0 0 0 3-3V8.67l-8.928 5.493a3 3 0 0 1-3.144 0L1.5 8.67Z" />
                <path d="M22.5 6.908V6.75a3 3 0 0 0-3-3h-15a3 3 0 0 0-3 3v.158l9.714 5.978a1.5 1.5 0 0 0 1.572 0L22.5 6.908Z" />
            </svg>
            <a href="">developers@gmail.com</a>
        </div>
    </div>
</body>

</html>
